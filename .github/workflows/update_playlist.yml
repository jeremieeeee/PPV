name: Generate Hourly M3U Playlist

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        # Install the browser binaries and system libraries needed to run headlessly
        playwright install chromium --with-deps

    - name: Run Playwright Script
      run: python generate_m3u.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add playlist.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated hourly M3U (.m3u8) update" && git push)
